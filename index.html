<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Dictation App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e24; color: #ffffff; margin: 0; padding: 20px; }
        .header { text-align: center; margin-bottom: 20px; }
        .upload-section { background-color: #2b2b36; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; justify-content: center; align-items: center; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .video-section { flex: 1; background-color: #000; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: auto; display: block; outline: none; }
        .dictation-section { flex: 1; background-color: #2b2b36; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; }
        .controls { display: flex; gap: 10px; margin-bottom: 15px; align-items: center; flex-wrap: wrap; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { filter: brightness(1.1); }
        button:disabled { background-color: #555; cursor: not-allowed; filter: none; }
        .btn-play { background-color: #2196F3; }
        .btn-hint { background-color: #9c27b0; } 
        .btn-answer { background-color: #ff9800; }
        .btn-prev { background-color: #607d8b; }
        select { background-color: #1e1e24; color: white; border: 1px solid #444; padding: 8px; border-radius: 5px; cursor: pointer; }
        
        #visualFeedback { min-height: 40px; background-color: #1a1a20; border: 1px dashed #444; border-radius: 5px; padding: 10px; margin-bottom: 10px; font-size: 18px; display: none; line-height: 1.5; }
        .word-correct { color: #4CAF50; }
        .word-incorrect { color: #ff5252; }
        .char-incorrect { text-decoration: underline; text-decoration-color: #ff5252; text-decoration-thickness: 2px; }
        textarea { width: 100%; height: 100px; background-color: #1e1e24; color: #fff; border: 1px solid #444; border-radius: 5px; padding: 10px; font-size: 18px; resize: none; box-sizing: border-box; margin-bottom: 15px; line-height: 1.5; }
        textarea:focus { outline: none; border-color: #2196F3; background-color: #25252e; }
        #statusMessage { margin-bottom: 15px; font-weight: bold; }
        .text-success { color: #4CAF50; }
        .text-hint { color: #9c27b0; font-size: 14px; font-style: italic; margin-left: 10px;}
        .text-finish { color: #ffeb3b; font-size: 18px; display: block; margin-top: 5px; animation: blink 1.5s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
        .answer-box { background-color: #1e1e24; padding: 15px; border-radius: 5px; border: 1px solid #444; display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="header"><h2>Advanced Dictation App</h2></div>

    <div class="upload-section">
        <div><label>1. Video (.mp4): </label><input type="file" id="videoUpload" accept="video/mp4,video/webm"></div>
        <div><label>2. Phụ đề (.srt): </label><input type="file" id="srtUpload" accept=".srt"></div>
    </div>

    <div class="container">
        <div class="video-section"><video id="videoPlayer" controls></video></div>

        <div class="dictation-section">
            <div class="controls">
                <button id="btnPlay" class="btn-play" disabled>▶ Nghe lại (Phím Shift)</button>
                <select id="speedControl" disabled>
                    <option value="0.5">Tốc độ: 0.5x</option>
                    <option value="0.75">Tốc độ: 0.75x</option>
                    <option value="1" selected>Tốc độ: Chuẩn (1x)</option>
                    <option value="1.25">Tốc độ: 1.25x</option>
                </select>
                <span id="progressText" style="color: #aaa; margin-left: 10px;">0 / 0</span>
            </div>

            <div id="visualFeedback"></div>
            <textarea id="userInput" placeholder="Gõ và nhấn Enter để kiểm tra..." disabled></textarea>
            <div id="statusMessage"></div>

            <div class="controls">
                <button id="btnHintWord" class="btn-hint" disabled>Gợi ý từ (Phím =)</button>
                <button id="btnShowAnswer" class="btn-answer" disabled>Xem đáp án</button>
                <button id="btnPrev" class="btn-prev" disabled>⏮ Câu trước</button>
                <button id="btnNext" disabled>Câu tiếp theo ⏭</button>
            </div>

            <div id="answerBox" class="answer-box">
                <strong>Đáp án đầy đủ:</strong>
                <p id="correctAnswerText" style="margin-top: 5px; font-size: 16px;"></p>
            </div>
        </div>
    </div>

    <script>
        const videoPlayer = document.getElementById('videoPlayer');
        const videoUpload = document.getElementById('videoUpload');
        const srtUpload = document.getElementById('srtUpload');
        const speedControl = document.getElementById('speedControl');
        
        const btnPlay = document.getElementById('btnPlay');
        const btnHintWord = document.getElementById('btnHintWord');
        const btnShowAnswer = document.getElementById('btnShowAnswer');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const userInput = document.getElementById('userInput');
        
        const visualFeedback = document.getElementById('visualFeedback');
        const statusMessage = document.getElementById('statusMessage');
        const answerBox = document.getElementById('answerBox');
        const correctAnswerText = document.getElementById('correctAnswerText');
        const progressText = document.getElementById('progressText');

        let subtitles = [];
        let currentIndex = 0;
        let isPlayingSegment = false;
        let lastEnterTime = 0;
        let isSentenceCompleted = false;
        
        let userDrafts = {}; 
        let userProgress = {};
        let currentSrtName = "";

        function saveProgressToLocal() {
            if (!currentSrtName) return;
            try {
                const dataToSave = {
                    currentIndex: currentIndex,
                    userDrafts: userDrafts,
                    userProgress: userProgress
                };
                localStorage.setItem('dictation_' + currentSrtName, JSON.stringify(dataToSave));
            } catch (e) {}
        }

        function clearProgressFromLocal() {
            if (!currentSrtName) return;
            try {
                localStorage.removeItem('dictation_' + currentSrtName);
            } catch (e) {}
        }

        videoUpload.addEventListener('click', function() { this.value = null; });
        videoUpload.addEventListener('change', e => { 
            if(e.target.files[0]) {
                videoPlayer.src = URL.createObjectURL(e.target.files[0]); 
            }
        });
        
        srtUpload.addEventListener('click', function() { this.value = null; });
        srtUpload.addEventListener('change', e => {
            if(e.target.files[0]) {
                const file = e.target.files[0];
                currentSrtName = file.name;
                const reader = new FileReader();
                reader.onload = e => {
                    subtitles = parseSRT(e.target.result);
                    if(subtitles.length > 0) { 
                        try {
                            const savedData = localStorage.getItem('dictation_' + currentSrtName);
                            if (savedData) {
                                const parsedData = JSON.parse(savedData);
                                currentIndex = parsedData.currentIndex || 0;
                                userDrafts = parsedData.userDrafts || {};
                                userProgress = parsedData.userProgress || {};
                            } else {
                                currentIndex = 0;
                                userDrafts = {}; 
                                userProgress = {};
                            }
                        } catch (error) {
                            currentIndex = 0;
                            userDrafts = {}; 
                            userProgress = {};
                        }

                        enableControls(); 
                        loadCurrentSubtitle(); 
                    } else {
                        alert("Không thể đọc phụ đề. Vui lòng kiểm tra lại định dạng file SRT.");
                    }
                };
                reader.readAsText(file);
            }
        });

        speedControl.addEventListener('change', function() {
            videoPlayer.playbackRate = parseFloat(this.value);
        });

        function parseSRT(data) {
            const regex = /(?:\d+)\s+(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\s+([\s\S]*?)(?=\n\s*\n|\s*$)/g;
            let match, subs = [];
            while ((match = regex.exec(data)) !== null) {
                let rawText = match[3].replace(/<[^>]+>/g, '').replace(/\[.*?\]/g, '');
                let cleanText = rawText.replace(/\n/g, ' ').trim();
                
                if (cleanText.length > 0) {
                    subs.push({ 
                        start: timeToSeconds(match[1]), 
                        end: timeToSeconds(match[2]), 
                        text: cleanText 
                    });
                }
            }
            for (let i = 0; i < subs.length - 1; i++) {
                subs[i].end = subs[i + 1].start;
            }
            return subs;
        }

        function timeToSeconds(t) {
            const p = t.split(':'), s = p[2].split(',');
            return parseInt(p[0])*3600 + parseInt(p[1])*60 + parseInt(s[0]) + parseInt(s[1])/1000;
        }

        function enableControls() {
            btnPlay.disabled = btnHintWord.disabled = btnShowAnswer.disabled = btnPrev.disabled = btnNext.disabled = userInput.disabled = speedControl.disabled = false;
        }

        function loadCurrentSubtitle() {
            if (currentIndex >= subtitles.length) return;
            
            visualFeedback.style.display = 'none';
            visualFeedback.innerHTML = '';
            answerBox.style.display = 'none';
            statusMessage.innerHTML = '';
            progressText.innerText = `${currentIndex + 1} / ${subtitles.length}`;
            videoPlayer.playbackRate = parseFloat(speedControl.value);
            
            userInput.value = userDrafts[currentIndex] || '';
            isSentenceCompleted = false; 

            if (userInput.value.trim() !== '') {
                checkDictationLogic();
            }
            
            saveProgressToLocal(); 
            userInput.focus();
            playCurrentSegment();
        }

        function playCurrentSegment() {
            if (subtitles.length === 0) return;
            videoPlayer.currentTime = subtitles[currentIndex].start;
            videoPlayer.play();
            isPlayingSegment = true;
        }

        videoPlayer.addEventListener('timeupdate', () => {
            if (!isPlayingSegment || subtitles.length === 0) return;
            // Kiểm tra mốc kết thúc câu, chỉ tự động ngắt khi nó đang ở trạng thái phát câu theo kịch bản
            if (videoPlayer.currentTime >= subtitles[currentIndex].end) {
                videoPlayer.pause();
                isPlayingSegment = false;
            }
        });

        btnPlay.addEventListener('click', playCurrentSegment);
        
        btnShowAnswer.addEventListener('click', () => {
            const currentTarget = subtitles[currentIndex].text;
            correctAnswerText.innerText = currentTarget;
            answerBox.style.display = 'block';
            
            userInput.value = currentTarget;
            checkDictationLogic();
            userInput.focus();
        });

        btnPrev.addEventListener('click', () => {
            userDrafts[currentIndex] = userInput.value;
            if (currentIndex > 0) { currentIndex--; loadCurrentSubtitle(); }
        });

        btnNext.addEventListener('click', () => {
            userDrafts[currentIndex] = userInput.value;
            if (currentIndex < subtitles.length - 1) { currentIndex++; loadCurrentSubtitle(); }
        });

        // Bắt phím Shift chung (nếu người dùng đang trỏ ở ngoài Textarea)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Shift' && !e.ctrlKey && !e.altKey && !e.metaKey && document.activeElement !== userInput) {
                e.preventDefault(); 
                playCurrentSegment();
            }
        });

        function cleanWord(word) {
            return word.toLowerCase()
                       .replace(/['’‘´]/g, "") 
                       .replace(/[.,\/#!$%\^&\*;:{}=\-_`~()"]/g, "") 
                       .trim();
        }

        function checkDictationLogic() {
            const currentTarget = subtitles[currentIndex].text;
            const targetWordsRaw = currentTarget.trim().split(/\s+/);
            
            const originalText = userInput.value;
            const userWordsRaw = originalText.trim().split(/\s+/).filter(w => w !== "");

            if (userWordsRaw.length === 0) return;

            let visualHTML = ""; 
            let newTextareaValue = ""; 
            let isPerfect = true;

            for (let i = 0; i < userWordsRaw.length; i++) {
                const uWordClean = cleanWord(userWordsRaw[i]);
                const tWordClean = i < targetWordsRaw.length ? cleanWord(targetWordsRaw[i]) : null;

                if (tWordClean && uWordClean === tWordClean) {
                    visualHTML += `<span class="word-correct">${targetWordsRaw[i]}</span> `;
                    newTextareaValue += targetWordsRaw[i] + " "; 
                } else {
                    let formattedUserWord = "";
                    let targetWord = targetWordsRaw[i] || ""; 
                    
                    // Kiểm tra từng ký tự trong từ sai
                    for (let j = 0; j < userWordsRaw[i].length; j++) {
                        let uChar = userWordsRaw[i][j];
                        let tChar = j < targetWord.length ? targetWord[j] : null;
                        
                        // Nếu ký tự khác nhau (không phân biệt hoa/thường) hoặc user gõ dư ký tự
                        if (!tChar || uChar.toLowerCase() !== tChar.toLowerCase()) {
                            formattedUserWord += `<span class="char-incorrect">${uChar}</span>`;
                        } else {
                            formattedUserWord += uChar;
                        }
                    }

                    visualHTML += `<span class="word-incorrect">${formattedUserWord}</span> `;
                    newTextareaValue += userWordsRaw[i];
                    if (i < userWordsRaw.length - 1) {
                        newTextareaValue += " ";
                    }
                    isPerfect = false;
                }
            }

            if (originalText.endsWith(" ") || originalText.endsWith("\n")) {
                if (!newTextareaValue.endsWith(" ")) {
                    newTextareaValue += " ";
                }
            }

            visualFeedback.innerHTML = visualHTML.trim(); 
            visualFeedback.style.display = 'block';
            userInput.value = newTextareaValue;

            if (isPerfect && userWordsRaw.length === targetWordsRaw.length) {
                userInput.value = currentTarget; 
                isSentenceCompleted = true;
                userProgress[currentIndex] = currentTarget;
                userDrafts[currentIndex] = currentTarget;
                
                if (currentIndex === subtitles.length - 1) {
                    statusMessage.innerHTML = '<span class="text-success">✔ Chính xác!</span><span class="text-finish">🎉 CHÚC MỪNG BẠN ĐÃ HOÀN THÀNH BÀI HỌC NÀY! 🎉</span>';
                    clearProgressFromLocal(); 
                } else {
                    statusMessage.innerHTML = '<span class="text-success">✔ Chính xác!</span><span class="text-hint">(Nhấn Enter để sang câu tiếp theo)</span>';
                    saveProgressToLocal(); 
                }
            } else { 
                statusMessage.innerHTML = ''; 
                isSentenceCompleted = false; 
                delete userProgress[currentIndex];
                userDrafts[currentIndex] = userInput.value;
                saveProgressToLocal();
            }
        }

        function triggerHint() {
            const currentTarget = subtitles[currentIndex].text;
            const targetWordsRaw = currentTarget.trim().split(/\s+/);
            const userWordsRaw = userInput.value.trim().split(/\s+/).filter(w => w !== "");

            let correctCount = 0;
            for (let i = 0; i < userWordsRaw.length; i++) {
                if (i < targetWordsRaw.length && cleanWord(userWordsRaw[i]) === cleanWord(targetWordsRaw[i])) { correctCount++; } 
                else { break; }
            }

            if (correctCount < targetWordsRaw.length) {
                const newWords = targetWordsRaw.slice(0, correctCount + 1);
                userInput.value = newWords.join(" ") + " ";
                checkDictationLogic(); userInput.focus();
            }
        }
        
        btnHintWord.addEventListener('click', triggerHint);

        userInput.addEventListener('input', function() {
            userDrafts[currentIndex] = userInput.value;
            saveProgressToLocal(); 
            
            if (isSentenceCompleted) {
                isSentenceCompleted = false;
                statusMessage.innerHTML = '';
                visualFeedback.style.display = 'none';
            }
        });

        // --- CẬP NHẬT LÕI XỬ LÝ PHÍM BẤM ĐA NĂNG ---
        userInput.addEventListener('keydown', function(e) {
            
            // 0. Phím "-" (Pause / Phát)
            if (e.key === '-') {
                e.preventDefault(); // Ngăn in dấu "-" vào ô nháp
                if (!videoPlayer.paused) {
                    // Đang phát -> Dừng
                    videoPlayer.pause();
                    isPlayingSegment = false; 
                } else {
                    // Đang dừng -> Phát tiếp (KHÔNG tua lại)
                    videoPlayer.play();
                    isPlayingSegment = true; // Bật lại công tắc để nó tự dừng khi hết câu
                }
                return;
            }

            // MỚI: Phím "[" để tua lùi 3 giây
            if (e.key === '[') {
                e.preventDefault();
                videoPlayer.currentTime = Math.max(0, videoPlayer.currentTime - 3);
                return;
            }

            // MỚI: Phím "]" để tua tới 3 giây
            if (e.key === ']') {
                e.preventDefault();
                videoPlayer.currentTime += 3;
                return;
            }

            // 1. Phím "=" để Gợi ý từ
            if (e.key === '=') {
                e.preventDefault(); 
                triggerHint();
                return;
            }

            // 2. Phím "Enter" để Kiểm tra lỗi / Đi tiếp
            if (e.key === 'Enter') {
                e.preventDefault(); 
                if (isSentenceCompleted) { 
                    if (currentIndex < subtitles.length - 1) { btnNext.click(); } 
                } 
                else {
                    checkDictationLogic();
                }
                return;
            }

            // 3. Phím "Shift" để phát lại từ đầu câu
            if (e.key === 'Shift') {
                e.preventDefault();
                playCurrentSegment();
                return;
            }

            // 4. Khóa bàn phím khi câu đã hoàn thành đúng 100%
            if (isSentenceCompleted) {
                // Chỉ cho phép dùng các phím xóa, bôi đen, chuyển hướng
                const allowedKeys = ['Backspace', 'Delete', 'ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Shift', 'Control', 'Alt', 'Meta'];
                if (!allowedKeys.includes(e.key)) {
                    e.preventDefault(); 
                }
            }
        });

        userInput.addEventListener('focus', function() {
            if (subtitles.length === 0) return;
            const currentSub = subtitles[currentIndex];
            if (videoPlayer.currentTime < currentSub.start || videoPlayer.currentTime > currentSub.end) { playCurrentSegment(); }
        });
    </script>
</body>
</html>
